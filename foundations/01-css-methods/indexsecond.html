<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Methods for Adding CSS</title>
  <!-- Add link to style.css for external css task --> 
    <link rel="stylesheet" href="./style.css">
    <style>
      p {
        /* make font color of p element white */
        color: white;
        /* make background color of p element green */
        background-color: green;
      }
        
    </style> 
  </head>
  <body>
    <div>Style me via the external method!</div>
    <p>I would like to be styled with the internal method, please.</p>
    <!-- Change the font color size and background color of the button element using inline css -->
    <button style="color: black; font-size: 22px; background-color: orange">Inline Method</button>
  </body>
</html>
